<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enemy Location</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <input type="checkbox" id="checkmn" checked />
        <label for="checkmn" id="toggle-btn">☰</label>

        <a href="index.html">📊 <span>Character Status</span></a>
        <a href="create.html">➕ <span>Create New Character</span></a>
        <a href="tier_list.html">🏆 <span>Tier List</span></a> 
        <a href="update_list.html">📝 <span>Character Update</span></a>
        <a href="backup_recovery.html">💾 <span>Backup/Recovery</span></a>
        <a href="enemy_location.html" class="active">🗺️ <span>Enemy Location</span></a>
    </div>

    <div id="main-content">
        <h1>Enemy Locations</h1>
        
        <div id="enemy-container" class="enemy-grid"></div>
    </div>

    <script>
        // Data Musuh (Bisa Anda tambah/edit dengan mudah di sini)
        const enemiesData = [
            { id: "slime1", name: "Green Slime", img: "slime.png", locations: ["1-3", "1-8", "2-7", "4-9"] },
            { id: "goblin1", name: "Hobgoblin", img: "goblin.png", locations: ["2-3", "2-8", "5-7", "6-9"] },
            { id: "dragon1", name: "Fire Drake", img: "dragon.png", locations: ["1-4", "1-5", "2-6", "3-9"] },
            { id: "wolf1", name: "Dire Wolf", img: "wolf.png", locations: ["1-8", "4-5", "9-6", "14-9"] }
        ];

        function renderEnemies() {
            const container = document.getElementById('enemy-container');
            let html = '';

            enemiesData.forEach(enemy => {
                // Generate badge lokasi
                const locationBadges = enemy.locations
                    .map(loc => `<span class="loc-badge">[${loc}]</span>`)
                    .join('');

                // Render Kartu. Menggunakan SVG untuk teks melengkung.
                html += `
                <div class="enemy-card">
                    <div class="enemy-profile">
                        <img src="img/${enemy.img}" alt="${enemy.name}" onerror="this.src='img/default.png'">
                        
                        <svg class="enemy-name-svg" viewBox="0 0 120 120">
                            <path id="curve-${enemy.id}" d="M 15 65 A 45 45 0 0 0 105 65" fill="transparent" />
                            <text>
                                <textPath href="#curve-${enemy.id}" startOffset="50%" text-anchor="middle">
                                    ${enemy.name}
                                </textPath>
                            </text>
                        </svg>
                    </div>
                    
                    <div class="enemy-locations">
                        ${locationBadges}
                    </div>
                </div>
                `;
            });

            container.innerHTML = html;
        }

        // Jalankan saat halaman selesai dimuat
        document.addEventListener('DOMContentLoaded', renderEnemies);
    </script>
</body>
</html>
