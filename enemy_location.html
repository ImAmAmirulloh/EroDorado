<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enemy Location</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <input type="checkbox" id="checkmn" checked />
        <label for="checkmn" id="toggle-btn">☰</label>

        <a href="index.html">📊 <span>Character Status</span></a>
        <a href="create.html">➕ <span>Create New Character</span></a>
        <a href="tier_list.html">🏆 <span>Tier List</span></a> 
        <a href="enemy_location.html" class="active">🗺️ <span>Enemy Location</span></a>
        <a href="update_list.html">📝 <span>Character Update</span></a>
        <a href="backup_recovery.html">💾 <span>Backup/Recovery</span></a>
    </div>

    <div id="main-content">
        <h1>Enemy Locations</h1>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Hover over an enemy card and click the pencil icon to edit. Locations should be comma-separated (e.g., 1-4, 2-7, 8-9).</p>
        
        <div id="enemy-container" class="enemy-grid"></div>
    </div>

    <script>
        const ENEMY_STORAGE_KEY = 'ENEMY_DATA_V1';

        // Default Data jika belum ada di Local Storage
        const defaultEnemies = [
            { id: "e1", name: "Green Slime", locations: ["1-3", "1-8", "2-7", "4-9"] }
        ];

        let enemiesData = [];

        function loadEnemies() {
            const stored = localStorage.getItem(ENEMY_STORAGE_KEY);
            if (stored) {
                enemiesData = JSON.parse(stored);
            } else {
                enemiesData = [...defaultEnemies];
                saveEnemies();
            }
            renderEnemies();
        }

        function saveEnemies() {
            localStorage.setItem(ENEMY_STORAGE_KEY, JSON.stringify(enemiesData));
        }

        // Fungsi untuk mengelompokkan data "1-2, 1-8" menjadi { "1": ["2", "8"] }
function groupLocations(locationsArray) {
    const groups = {};
    locationsArray.forEach(loc => {
        const split = loc.split('-');
        if (split.length === 2) {
            const map = split[0].trim();
            const zone = split[1].trim();
            if (!groups[map]) groups[map] = [];
            groups[map].push(zone);
        }
    });
    return groups;
}
        
        function createEnemyCard(enemy, index) {
    const groups = groupLocations(enemy.locations);
    
    // Generate HTML untuk box lokasi bertumpuk
    let locationHTML = '';
    for (const map in groups) {
        locationHTML += `
            <div class="loc-group-box">
                <div class="loc-map-title">${map}</div>
                <div class="loc-zones">${groups[map].join(', ')}</div>
            </div>
        `;
    }

    return `
    <div class="enemy-card" id="enemy-card-${index}">
        <button class="enemy-edit-btn" onclick="activateEdit(${index})">✏️</button>
        
        <div class="enemy-left-panel">
            <div class="enemy-profile">
                <img src="img/enemy/${enemy.name}.png" alt="${enemy.name}" onerror="this.src='img/default.png'">
                <svg class="enemy-name-svg" viewBox="0 0 120 120">
                    <path id="curve-${index}" d="M 15 65 A 45 45 0 0 0 105 65" fill="transparent" />
                    <text><textPath href="#curve-${index}" startOffset="50%" text-anchor="middle">${enemy.name}</textPath></text>
                </svg>
            </div>
        </div>

        <div class="enemy-right-panel">
            ${locationHTML || '<span style="color:#555;">No Data</span>'}
        </div>
    </div>
    `;
}

        // Render HTML Mode Edit
        function createEnemyEdit(enemy, index) {
            const locationString = enemy.locations.join(', ');

            return `
            <div class="enemy-card" style="border-color: var(--accent); flex-direction: column; align-items: stretch; gap: 10px;">
                <div style="font-weight: bold; color: var(--accent); margin-bottom: 5px;">Edit Enemy Mode</div>
                
                <label style="font-size: 0.8rem; color: var(--text-muted);">Name (Matches .png image)</label>
                <input type="text" id="edit-enemy-name-${index}" class="edit-input" value="${enemy.name}" placeholder="e.g., Fire Drake">
                
                <label style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Locations (Comma separated)</label>
                <textarea id="edit-enemy-loc-${index}" class="edit-input" style="resize: vertical; min-height: 50px;">${locationString}</textarea>
                
                <div class="action-buttons" style="margin-top: 5px; padding: 0;">
                    <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
                    <button class="btn-save" onclick="saveEdit(${index})">Save</button>
                </div>
            </div>
            `;
        }

        function renderEnemies() {
            const container = document.getElementById('enemy-container');
            container.innerHTML = enemiesData.map((enemy, index) => createEnemyCard(enemy, index)).join('');
        }

        function activateEdit(index) {
            // Render ulang semua untuk mereset kartu lain yang mungkin sedang diedit
            renderEnemies(); 
            const cardElement = document.getElementById(`enemy-card-${index}`);
            cardElement.outerHTML = createEnemyEdit(enemiesData[index], index);
        }

        function cancelEdit() {
            renderEnemies();
        }

        function saveEdit(index) {
            const newName = document.getElementById(`edit-enemy-name-${index}`).value.trim();
            const rawLocations = document.getElementById(`edit-enemy-loc-${index}`).value;
            
            // Pecah string berdasarkan koma, hapus spasi berlebih, dan hilangkan elemen kosong
            const newLocations = rawLocations.split(',').map(s => s.trim()).filter(s => s !== "");

            enemiesData[index].name = newName || "Unknown Enemy";
            enemiesData[index].locations = newLocations;

            saveEnemies();
            renderEnemies();
        }

        document.addEventListener('DOMContentLoaded', loadEnemies);
    </script>
</body>
</html>
