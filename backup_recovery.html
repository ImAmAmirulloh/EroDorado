<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backup & Recovery Data</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .submit-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: background-color 0.3s ease;
        }
        .json-area {
            width: 100%; 
            padding: 10px; 
            background: #111; 
            color: #ffae42; 
            border: 1px solid #444; 
            border-radius: 6px; 
            resize: vertical;
            font-family: monospace;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <input type="checkbox" id="checkmn" checked />
        <label for="checkmn" id="toggle-btn">☰</label>

        <a href="index.html">📊 <span>Character Status</span></a>
        <a href="create.html">➕ <span>Create New Character</span></a>
        <a href="tier_list.html">🏆 <span>Tier List</span></a>
        <a href="enemy_location.html">🗺️ <span>Enemy Location</span></a>
        <a href="update_list.html">📝 <span>Character Update</span></a>
        <a href="backup_recovery.html" class="active">💾 <span>Backup/Recovery</span></a>
    </div>

    <div id="main-content">
        <h1>Character Data Backup & Recovery</h1>
        <div class="card" style="margin-bottom: 30px;">
            <h2>Backup Characters</h2>
            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <button id="backup-btn" class="submit-btn" style="background-color: #5cb85c;">⬇️ Download JSON File</button>
                <button id="generate-json-btn" class="submit-btn" style="background-color: #007bff;">📋 Generate JSON Text</button>
            </div>
            
            <div id="json-output-container" style="display: none;">
                <textarea id="json-output" rows="10" readonly class="json-area"></textarea>
                <button id="copy-json-btn" class="submit-btn" style="background-color: #333; margin-top: 10px;">Copy to Clipboard</button>
            </div>
            <p id="backup-status" style="margin-top: 10px; color: #5cb85c;"></p>
        </div>

        <div class="card">
            <h2>Recovery Characters</h2>
            <input type="file" id="recovery-file-input" accept=".json" style="margin-bottom: 15px;">
            <button id="recovery-btn" class="submit-btn" style="background-color: #f0ad4e;">⬆️ Save to Browser</button>
            <p id="recovery-status" style="margin-top: 10px; color: #f0ad4e;"></p>
        </div>

        <hr style="border: 1px dashed var(--border); margin: 40px 0;">

        <h1>Enemy Data Backup & Recovery</h1>
        
        <div class="card" style="margin-bottom: 30px;">
            <h2>Backup Enemy Data</h2>
            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <button id="backup-enemy-btn" class="submit-btn" style="background-color: #5cb85c;">⬇️ Download Enemy JSON</button>
                <button id="generate-enemy-json-btn" class="submit-btn" style="background-color: #007bff;">📋 Generate Enemy Text</button>
            </div>

            <div id="enemy-json-container" style="display: none;">
                <textarea id="enemy-json-output" rows="10" readonly class="json-area"></textarea>
                <button id="copy-enemy-json-btn" class="submit-btn" style="background-color: #333; margin-top: 10px;">Copy to Clipboard</button>
            </div>
            <p id="backup-enemy-status" style="margin-top: 10px; color: #5cb85c;"></p>
        </div>

        <div class="card">
            <h2>Recovery Enemy Data</h2>
            <input type="file" id="recovery-enemy-file" accept=".json" style="margin-bottom: 15px;">
            <button id="recovery-enemy-btn" class="submit-btn" style="background-color: #f0ad4e;">⬆️ Save Enemy to Browser</button>
            <p id="recovery-enemy-status" style="margin-top: 10px; color: #f0ad4e;"></p>
        </div>
    </div>

    <script>
        const CHAR_STORAGE_KEY = 'CHARACTER_DATA_V1';
        const ENEMY_STORAGE_KEY = 'ENEMY_DATA_V1';

        // --- HELPER FUNCTIONS ---
        function getStorageData(key) {
            try { return JSON.parse(localStorage.getItem(key)) || []; } 
            catch { return []; }
        }

        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename + '_' + new Date().toISOString().slice(0, 10) + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function setupCopy(btnId, areaId) {
            const btn = document.getElementById(btnId);
            const area = document.getElementById(areaId);
            btn.addEventListener('click', () => {
                area.select();
                document.execCommand('copy');
                const originalText = btn.innerText;
                btn.innerText = '✅ Copied!';
                setTimeout(() => btn.innerText = originalText, 1500);
            });
        }

        // ==========================================================
        // 1. CHARACTER LOGIC
        // ==========================================================
        document.getElementById('backup-btn').addEventListener('click', () => {
            const data = getStorageData(CHAR_STORAGE_KEY);
            if (data.length === 0) return alert("No Character data found.");
            downloadJSON(data, 'characters_backup');
            document.getElementById('backup-status').innerText = `✅ ${data.length} characters downloaded.`;
        });

        document.getElementById('generate-json-btn').addEventListener('click', () => {
            const data = getStorageData(CHAR_STORAGE_KEY);
            const container = document.getElementById('json-output-container');
            const area = document.getElementById('json-output');
            area.value = JSON.stringify(data, null, 2);
            container.style.display = 'block';
        });
        setupCopy('copy-json-btn', 'json-output');

        document.getElementById('recovery-btn').addEventListener('click', () => {
            const file = document.getElementById('recovery-file-input').files[0];
            const status = document.getElementById('recovery-status');
            if (!file) return alert("Select file first.");

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    // Karakter biasanya punya properti 'element' atau 'power'
                    if (!Array.isArray(imported) || (imported.length > 0 && !imported[0].element)) {
                        throw new Error("Format salah. Ini bukan file backup Karakter.");
                    }
                    if (confirm(`Overwrite characters with ${imported.length} new entries?`)) {
                        localStorage.setItem(CHAR_STORAGE_KEY, JSON.stringify(imported));
                        status.innerText = "✅ Character recovery success!";
                        setTimeout(() => window.location.href = 'index.html', 1000);
                    }
                } catch (err) { status.innerText = "❌ Error: " + err.message; }
            };
            reader.readAsText(file);
        });

        // ==========================================================
        // 2. ENEMY LOGIC (FIXED FOR NEW JSON STRUCTURE)
        // ==========================================================
        document.getElementById('backup-enemy-btn').addEventListener('click', () => {
            const data = getStorageData(ENEMY_STORAGE_KEY);
            if (data.length === 0) return alert("No Enemy data found.");
            downloadJSON(data, 'enemy_backup');
            document.getElementById('backup-enemy-status').innerText = `✅ ${data.length} enemies downloaded.`;
        });

        document.getElementById('generate-enemy-json-btn').addEventListener('click', () => {
            const data = getStorageData(ENEMY_STORAGE_KEY);
            const container = document.getElementById('enemy-json-container');
            const area = document.getElementById('enemy-json-output');
            area.value = JSON.stringify(data, null, 2);
            container.style.display = 'block';
        });
        setupCopy('copy-enemy-json-btn', 'enemy-json-output');

        document.getElementById('recovery-enemy-btn').addEventListener('click', () => {
            const file = document.getElementById('recovery-enemy-file').files[0];
            const status = document.getElementById('recovery-enemy-status');
            if (!file) return alert("Select file first.");

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    
                    // PERBAIKAN VALIDASI: Cek properti 'data' sesuai struktur baru Anda
                    if (!Array.isArray(imported) || (imported.length > 0 && !imported[0].data)) {
                        throw new Error("Format salah. File ini tidak memiliki properti 'data' lokasi.");
                    }

                    if (confirm(`Overwrite enemy data with ${imported.length} new entries?`)) {
                        localStorage.setItem(ENEMY_STORAGE_KEY, JSON.stringify(imported));
                        status.innerText = "✅ Enemy recovery success!";
                        status.style.color = "#5cb85c";
                        setTimeout(() => window.location.href = 'enemy_location.html', 1000);
                    }
                } catch (err) { 
                    status.innerText = "❌ Error: " + err.message; 
                    status.style.color = "#ff5722";
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
